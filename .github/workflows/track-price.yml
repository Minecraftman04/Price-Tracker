name: Track basket prices

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/track-price.yml"
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
      - "config.json"
      - "index.html"
      - "styles.css"
      - "app.js"
      - ".nojekyll"
      - "data/latest.json"
      - "data/price-history.json"
  schedule:
    # Several chances are useful because GitHub scheduled jobs can be delayed.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: basket-price-tracker-pages
  cancel-in-progress: false

jobs:
  check-prices:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Test price parser
        run: python -m unittest discover -s tests -v

      - name: Check all product prices
        id: check
        run: |
          python scripts/run_price_check.py
          python scripts/apply_browser_price_fallbacks.py
          python scripts/apply_stock_fallbacks.py

      - name: Commit updated price data
        if: steps.check.outputs.data_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/price-history.json
          git commit -m "chore: record basket price checks"
          git pull --rebase origin main
          git push

      - name: Create price-drop notifications
        if: steps.check.outputs.alerts_json != '[]'
        uses: actions/github-script@v9
        env:
          ALERTS_JSON: ${{ steps.check.outputs.alerts_json }}
          TRACKER_URL: https://minecraftman04.github.io/Price-Tracker/
        with:
          script: |
            const alerts = JSON.parse(process.env.ALERTS_JSON || '[]');
            for (const alert of alerts) {
              const reason = alert.target_reached ? 'Your target price has been reached.' : 'The price has dropped.';
              const stockText = alert.in_stock === true ? 'In stock' : alert.in_stock === false ? 'Out of stock' : 'Stock status unknown';
              const body = [
                `## ${reason}`,
                '',
                `**Product:** ${alert.product_name}`,
                `**Current price:** £${alert.current_price}`,
                `**Previous price:** £${alert.previous_price}`,
                `**Drop:** £${alert.drop_amount} (${alert.drop_percent}%)`,
                `**Availability:** ${stockText}`,
                '',
                `[Open the product](${alert.product_url}) · [View the basket tracker](${process.env.TRACKER_URL})`,
                '',
                '_This issue was created automatically by the multi-product price tracker._'
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${alert.product_name} dropped to £${alert.current_price}`,
                body,
                assignees: [context.repo.owner]
              });
            }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: "."

      - name: Deploy website to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify published website
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          CHECKED_AT: ${{ steps.check.outputs.checked_at }}
        run: |
          verified=false
          for attempt in $(seq 1 12); do
            cache_bust="deployment=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl --fail --silent --show-error --location --max-time 20 "${PAGE_URL}?${cache_bust}" -o /tmp/price-tracker-index.html \
              && curl --fail --silent --show-error --location --max-time 20 "${PAGE_URL%/}/data/latest.json?${cache_bust}" -o /tmp/price-tracker-latest.json \
              && grep -Fq '<title>Basket Price Tracker</title>' /tmp/price-tracker-index.html \
              && python -c 'import json, pathlib, sys; payload=json.loads(pathlib.Path(sys.argv[2]).read_text()); raise SystemExit(0 if payload.get("generated_at") == sys.argv[1] and len(payload.get("products", [])) >= 10 else 1)' "$CHECKED_AT" /tmp/price-tracker-latest.json; then
              verified=true
              echo "Published basket tracker and current multi-product data verified at ${PAGE_URL}"
              break
            fi
            echo "Published content is not ready yet (attempt ${attempt}/12)."
            sleep 10
          done

          if [ "$verified" != true ]; then
            echo "GitHub Pages deployment completed, but the published content could not be verified." >&2
            exit 1
          fi

      - name: Record verified Pages deployment
        if: github.event_name == 'push'
        uses: actions/github-script@v9
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          CHECKED_AT: ${{ steps.check.outputs.checked_at }}
          PRODUCT_COUNT: ${{ steps.check.outputs.product_count }}
          FAILED_CHECKS: ${{ steps.check.outputs.failed_checks }}
        with:
          script: |
            const path = 'data/deployment-status.json';
            let fileSha;
            let existingStatus;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path
              });
              if (!Array.isArray(existing.data)) {
                fileSha = existing.data.sha;
                existingStatus = JSON.parse(Buffer.from(existing.data.content, 'base64').toString('utf8'));
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (existingStatus?.commit_sha === context.sha) {
              core.info(`Deployment for ${context.sha} is already recorded.`);
              return;
            }

            const status = {
              deployed: true,
              verified_at: process.env.CHECKED_AT,
              site_url: process.env.PAGE_URL,
              http_status: 200,
              commit_sha: context.sha,
              workflow_run_id: context.runId,
              product_count: Number(process.env.PRODUCT_COUNT),
              failed_checks: Number(process.env.FAILED_CHECKS),
              content_check: 'Basket Price Tracker with at least 10 products and matching generated timestamp'
            };

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'chore: record verified Pages deployment',
              content: Buffer.from(`${JSON.stringify(status, null, 2)}\n`).toString('base64'),
              sha: fileSha
            });
