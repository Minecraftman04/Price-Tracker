name: Track product price

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/track-price.yml"
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
      - "config.json"
      - "index.html"
      - "styles.css"
      - "app.js"
      - ".nojekyll"
  schedule:
    # GitHub scheduled workflow events can be delayed or dropped during high load.
    # Run every 5 minutes and let the checker record a history row only when the
    # 15-minute heartbeat window is due, giving several chances to hit each slot.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: price-tracker-pages
  # Never cancel an in-progress price check or Pages deployment because a
  # source push happened while it was running.
  cancel-in-progress: false

jobs:
  check-price:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Test price parser
        run: python -m unittest discover -s tests -v

      - name: Check current price
        id: check
        run: python scripts/run_price_check.py

      - name: Refresh website check timestamp
        env:
          CHECKED_AT: ${{ steps.check.outputs.checked_at }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("data/latest.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          payload["checked_at"] = os.environ["CHECKED_AT"]
          payload["source"] = "Automated GitHub Actions check"
          path.write_text(
              json.dumps(payload, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit updated price data
        if: steps.check.outputs.data_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/price-history.json
          git commit -m "chore: record price £${{ steps.check.outputs.price }}"
          git pull --rebase origin main
          git push

      - name: Create price-drop notification
        if: steps.check.outputs.dropped == 'true' || steps.check.outputs.target_reached == 'true'
        uses: actions/github-script@v9
        env:
          CURRENT_PRICE: ${{ steps.check.outputs.price }}
          PREVIOUS_PRICE: ${{ steps.check.outputs.previous_price }}
          DROP_AMOUNT: ${{ steps.check.outputs.drop_amount }}
          DROP_PERCENT: ${{ steps.check.outputs.drop_percent }}
          IN_STOCK: ${{ steps.check.outputs.in_stock }}
          PRODUCT_URL: https://www.overclockers.co.uk/corsair-vengeance-rgb-expo-32gb-2x16gb-ddr5-pc5-48000c30-6000mhz-dual-cha-my-4du-cs.html
          TRACKER_URL: https://minecraftman04.github.io/Price-Tracker/
        with:
          script: |
            const targetReached = '${{ steps.check.outputs.target_reached }}' === 'true';
            const reason = targetReached ? 'Your target price has been reached.' : 'The price has dropped.';
            const stockText = process.env.IN_STOCK === 'true' ? 'In stock' : process.env.IN_STOCK === 'false' ? 'Out of stock' : 'Stock status unknown';
            const body = [
              `## ${reason}`,
              '',
              `**Current price:** £${process.env.CURRENT_PRICE}`,
              `**Previous price:** £${process.env.PREVIOUS_PRICE}`,
              `**Drop:** £${process.env.DROP_AMOUNT} (${process.env.DROP_PERCENT}%)`,
              `**Availability:** ${stockText}`,
              '',
              `[Open the product](${process.env.PRODUCT_URL}) · [View price history](${process.env.TRACKER_URL})`,
              '',
              '_This issue was created automatically by the 15-minute price tracker._'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Price dropped to £${process.env.CURRENT_PRICE}`,
              body,
              assignees: [context.repo.owner]
            });

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: "."

      - name: Deploy website to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify published website
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          CHECKED_AT: ${{ steps.check.outputs.checked_at }}
        run: |
          verified=false
          for attempt in $(seq 1 12); do
            cache_bust="deployment=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl --fail --silent --show-error --location --max-time 20 "${PAGE_URL}?${cache_bust}" -o /tmp/price-tracker-index.html \
              && curl --fail --silent --show-error --location --max-time 20 "${PAGE_URL%/}/data/latest.json?${cache_bust}" -o /tmp/price-tracker-latest.json \
              && grep -Fq '<title>OcUK RAM Price Tracker</title>' /tmp/price-tracker-index.html \
              && python -c 'import json, pathlib, sys; payload=json.loads(pathlib.Path(sys.argv[2]).read_text()); raise SystemExit(0 if payload.get("checked_at") == sys.argv[1] else 1)' "$CHECKED_AT" /tmp/price-tracker-latest.json; then
              verified=true
              echo "Published website and latest check data verified at ${PAGE_URL}"
              break
            fi
            echo "Published content is not ready yet (attempt ${attempt}/12)."
            sleep 10
          done

          if [ "$verified" != true ]; then
            echo "GitHub Pages deployment completed, but the published content could not be verified." >&2
            exit 1
          fi

      - name: Record verified Pages deployment
        if: github.event_name == 'push'
        uses: actions/github-script@v9
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          CHECKED_AT: ${{ steps.check.outputs.checked_at }}
        with:
          script: |
            const path = 'data/deployment-status.json';
            let fileSha;
            let existingStatus;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path
              });
              if (!Array.isArray(existing.data)) {
                fileSha = existing.data.sha;
                existingStatus = JSON.parse(Buffer.from(existing.data.content, 'base64').toString('utf8'));
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (existingStatus?.commit_sha === context.sha) {
              core.info(`Deployment for ${context.sha} is already recorded.`);
              return;
            }

            const status = {
              deployed: true,
              verified_at: process.env.CHECKED_AT,
              site_url: process.env.PAGE_URL,
              http_status: 200,
              commit_sha: context.sha,
              workflow_run_id: context.runId,
              content_check: 'OcUK RAM Price Tracker and matching latest-check timestamp'
            };

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'chore: record verified Pages deployment',
              content: Buffer.from(`${JSON.stringify(status, null, 2)}\n`).toString('base64'),
              sha: fileSha
            });
